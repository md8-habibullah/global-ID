# CI: Build Verification (No Deployment)
name: Build Check (CI)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-check:
    name: Build on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24, 25] # Checks compat on all these versions

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      # 1. Setup pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      # 2. Setup Node.js (Matrix)
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      # 3. Install Dependencies
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # 4. Run Linter (Optional - checks for code errors)
      - name: Lint Code
        run: pnpm run lint
        continue-on-error: true # Don't stop build just for lint warnings

      # 5. Build Project (The Real Test)
      - name: Build Project
        run: pnpm run build
        env:
          # Disables static generation checks since we aren't exporting
          NEXT_TELEMETRY_DISABLED: 1
