version: 2
updates:
  # 1. Maintain Node.js dependencies (Handles pnpm automatically)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "23:53"
      timezone: "Asia/Dhaka"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "security"
      - "dependencies"
    # Grouping reduces PR noise and CI pipeline usage
    groups:
      all-deps:
        patterns:
          - "*"

  # 2. Maintain GitHub Actions workflows 
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "devops"
      - "ci-cd"
